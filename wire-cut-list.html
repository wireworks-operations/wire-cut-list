<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>EECOL – Wire Cut List</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4 text-xs">

<!-- Wire Cut List (Collapsible) -->
<div class="p-3 bg-gradient-to-r from-yellow-50 to-amber-50 border border-yellow-200 rounded-lg shadow-md">

  <button id="toggleWireList"
    class="w-full text-left font-semibold text-yellow-800 flex justify-between items-center">
    <span>🗂️ Wire Cut List</span>
    <span id="wireListToggle">►</span>
  </button>

  <div id="wireListContent" class="mt-2 text-xs space-y-2 hidden">

    <!-- Controls -->
    <div class="flex justify-between items-center flex-wrap gap-2">
      <div class="flex gap-2">
        <button id="addWireListItemBtn"
          class="px-2 py-1 bg-yellow-600 text-white rounded hover:bg-yellow-700 transition font-bold">
          + Add Item
        </button>
        <button id="refreshWireListBtn"
          class="px-2 py-1 bg-amber-500 text-white rounded hover:bg-amber-600 transition font-bold">
          🔄 Refresh
        </button>
      </div>

      <div class="flex items-center gap-2">
        <div class="flex items-center gap-1">
          <label class="font-medium">Search:</label>
          <input id="wireListSearch" type="text" placeholder="Search list..."
            class="p-1 border border-yellow-300 rounded bg-white text-xs w-24 sm:w-32">
        </div>
        <div class="flex items-center gap-1">
          <label class="font-medium">Filter:</label>
          <select id="wireListStatusFilter"
            class="p-1 border border-yellow-300 rounded bg-white text-xs">
            <option value="active">Active</option>
            <option value="completed">Completed</option>
            <option value="removed">Removed</option>
            <option value="all">All</option>
          </select>
        </div>
      </div>
    </div>

    <!-- List -->
    <div id="wireCutListItems" class="space-y-3 pt-2 min-h-[50px]">
      <p class="text-center text-gray-500 italic">No pending items in the list.</p>
    </div>

  </div>
</div>

<!-- Simple Add Modal -->
<div id="addModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
  <div class="bg-white p-3 rounded-lg w-full max-w-md text-xs">
    <h3 class="font-bold mb-2">Add Wire Cut Item</h3>

    <input id="orderNumber" placeholder="Order #" class="w-full p-1 border mb-1">
    <input id="lineNumber" placeholder="Line #" class="w-full p-1 border mb-1">
    <input id="customer" placeholder="Customer" class="w-full p-1 border mb-1">
    <input id="shipVia" placeholder="Ship Via" class="w-full p-1 border mb-1">
    <textarea id="wireDescription" placeholder="Wire Description"
      class="w-full p-1 border mb-2"></textarea>

    <div class="flex justify-end gap-2">
      <button onclick="closeModal()">Cancel</button>
      <button onclick="saveItem()"
        class="px-2 py-1 bg-yellow-600 text-white rounded font-bold">Save</button>
    </div>
  </div>
</div>

<script>
/* =========================
   IndexedDB
========================= */
const DB_NAME = 'eecol_wire_cut_list';
const STORE = 'items';
let db;
let wireListItems = [];
let searchTerm = '';
let statusFilter = 'active';

function openDB() {
  return new Promise(res => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(STORE, { keyPath: 'id' });
    };
    req.onsuccess = e => {
      db = e.target.result;
      res();
    };
  });
}

function getAll() {
  return new Promise(res => {
    const r = db.transaction(STORE).objectStore(STORE).getAll();
    r.onsuccess = () => res(r.result);
  });
}

function save(item) {
  db.transaction(STORE, 'readwrite').objectStore(STORE).put(item);
}

function removeHard(id) {
  db.transaction(STORE, 'readwrite').objectStore(STORE).delete(id);
}

/* =========================
   UI Logic
========================= */
const listEl = document.getElementById('wireCutListItems');
const modal = document.getElementById('addModal');

function renderWireList() {
  listEl.innerHTML = '';

  const filtered = wireListItems.filter(item => {
    if (statusFilter !== 'all' && item.status !== statusFilter) return false;

    if (searchTerm) {
      const haystack = `
        ${item.orderNumber}
        ${item.lineNumber}
        ${item.customer}
        ${item.shipVia}
        ${item.wireDescription}
      `.toLowerCase();
      if (!haystack.includes(searchTerm)) return false;
    }

    return true;
  });

  if (!filtered.length) {
    listEl.innerHTML =
      `<p class="text-center text-gray-500 italic">No pending items in the list.</p>`;
    return;
  }

  filtered.forEach(item => {
    const el = document.createElement('div');
    el.className = 'wire-list-item';
    el.draggable = true;
    el.dataset.id = item.id;

    el.innerHTML = `
      <div class="bg-white border border-black/10 rounded shadow-sm p-2">
        <div class="flex justify-between items-start border-b border-black/10 pb-1 mb-1 font-bold text-[10px] uppercase">
          <div>Order / Line Customer</div>
          <div>Order Comments</div>
          <div>Shipper Comments</div>
        </div>

        <div class="flex gap-2">
          <div class="w-1/3">
            <div class="font-bold text-sm">${item.orderNumber} / ${item.lineNumber}</div>
            <div class="text-[9px] font-bold">${item.customer}</div>

            <div class="mt-2 bg-black/5 border border-black/10 p-1 rounded italic font-black text-xs">
              ${item.shipVia} &nbsp;&nbsp; ${item.wireDescription}
            </div>
          </div>
          <div class="w-1/3 border-l border-black/10 pl-2 text-[10px]"></div>
          <div class="w-1/3 border-l border-black/10 pl-2 text-[10px]"></div>
        </div>

        <div class="flex justify-end gap-2 mt-2 pt-1 border-t border-black/5">
          <button class="px-2 py-0.5 bg-green-600 text-white rounded text-[9px] font-bold"
            onclick="completeItem('${item.id}')">✅ Complete</button>
          <button class="px-2 py-0.5 bg-red-600 text-white rounded text-[9px] font-bold"
            onclick="softRemoveItem('${item.id}')">❌ Remove</button>
        </div>
      </div>
    `;

    el.oncontextmenu = e => {
      e.preventDefault();
      removeHard(item.id);
      loadAndRender();
    };

    listEl.appendChild(el);
  });
}

async function loadAndRender() {
  wireListItems = await getAll();
  renderWireList();
}

/* =========================
   Actions
========================= */
function saveItem() {
  save({
    id: crypto.randomUUID(),
    orderNumber: orderNumber.value,
    lineNumber: lineNumber.value,
    customer: customer.value,
    shipVia: shipVia.value,
    wireDescription: wireDescription.value,
    status: 'active',
    createdAt: Date.now()
  });
  closeModal();
  loadAndRender();
}

function completeItem(id) {
  const item = wireListItems.find(i => i.id === id);
  if (!item) return;
  item.status = 'completed';
  save(item);
  renderWireList();
}

function softRemoveItem(id) {
  const item = wireListItems.find(i => i.id === id);
  if (!item) return;
  item.status = 'removed';
  save(item);
  renderWireList();
}

/* =========================
   Events
========================= */
document.getElementById('toggleWireList').onclick = () => {
  wireListContent.classList.toggle('hidden');
  wireListToggle.textContent =
    wireListContent.classList.contains('hidden') ? '►' : '▼';
};

document.getElementById('addWireListItemBtn').onclick = () => {
  modal.classList.remove('hidden');
  modal.classList.add('flex');
};

document.getElementById('refreshWireListBtn').onclick = loadAndRender;

document.getElementById('wireListSearch').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
  renderWireList();
});

document.getElementById('wireListStatusFilter').addEventListener('change', e => {
  statusFilter = e.target.value;
  renderWireList();
});

function closeModal() {
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}

/* =========================
   Init
========================= */
openDB().then(loadAndRender);
</script>

</body>
</html>
